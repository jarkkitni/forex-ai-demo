<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลงาน — นักพัฒนา LINE Bot &amp; AI Automation</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--line:#232a34;--text:#e9edf2;--muted:#9aa4b2;--accent:#3ddc97;--accent2:#4ea1ff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Sarabun',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
  .wrap{max-width:900px;margin:0 auto;padding:0 22px}
  header{padding:70px 0 40px;text-align:center}
  .kicker{color:var(--accent);font-weight:700;letter-spacing:1px;font-size:14px}
  h1{font-size:38px;font-weight:800;margin:14px 0 14px;line-height:1.2}
  .lead{font-size:18px;color:var(--muted);max-width:620px;margin:0 auto}
  .stack{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:26px 0 0}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:13px;color:var(--text)}
  .section-title{font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:50px 0 18px;text-align:center}
  .proj{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:30px;margin-bottom:20px}
  .proj .tag{display:inline-block;background:rgba(61,220,151,.12);color:var(--accent);font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;margin-bottom:12px}
  .proj h3{font-size:22px;margin-bottom:10px}
  .proj p{color:var(--muted);margin-bottom:14px}
  .match{list-style:none;margin:14px 0}
  .match li{padding:5px 0 5px 26px;position:relative;color:var(--text);font-size:15px}
  .match li:before{content:"✓";position:absolute;left:0;color:var(--accent);font-weight:800}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .meta .t{background:#0d1117;border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--muted)}
  .btn{display:inline-block;margin-top:18px;background:var(--accent);color:#062015;font-weight:700;padding:11px 22px;border-radius:10px;text-decoration:none;font-size:15px}
  .btn-line{background:#06c755;color:#fff;margin-left:10px}
  .why{background:linear-gradient(135deg,rgba(78,161,255,.10),rgba(61,220,151,.08));border:1px solid var(--line);border-radius:18px;padding:32px;margin:20px 0;text-align:center}
  .why h2{font-size:24px;margin-bottom:12px}
  .why p{color:var(--muted);max-width:640px;margin:0 auto}
  footer{border-top:1px solid var(--line);padding:34px 0 60px;text-align:center;color:var(--muted);font-size:14px;margin-top:30px}
  footer a{color:var(--accent2);text-decoration:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
const DATA = /*__PORTFOLIO_DATA__*/ {};
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const h = DATA.header || {}, w = DATA.why || {}, c = DATA.contact || {};
const projects = DATA.projects || [];
const projHtml = projects.map(p => `
  <div class="proj">
    ${p.tag ? `<span class="tag">${esc(p.tag)}</span>` : ''}
    <h3>${esc(p.title)}</h3>
    <p>${esc(p.desc)}</p>
    ${(p.matches||[]).length ? `<ul class="match">${p.matches.map(m=>`<li>${esc(m)}</li>`).join('')}</ul>` : ''}
    ${(p.tech||[]).length ? `<div class="meta">${p.tech.map(t=>`<span class="t">${esc(t)}</span>`).join('')}</div>` : ''}
    ${p.link ? `<a class="btn" href="${esc(p.link)}">${esc(p.linkLabel||'ดูผลงาน →')}</a>` : ''}
    ${p.link2 ? `<a class="btn btn-line" target="_blank" href="${esc(p.link2)}">${esc(p.link2Label||'ลิงก์เพิ่มเติม →')}</a>` : ''}
  </div>`).join('');
document.getElementById('app').innerHTML = `
  <header class="wrap">
    ${h.kicker ? `<div class="kicker">${esc(h.kicker)}</div>` : ''}
    <h1>${esc(h.title)}</h1>
    <p class="lead">${esc(h.lead)}</p>
    ${(h.stack||[]).length ? `<div class="stack">${h.stack.map(s=>`<span class="chip">${esc(s)}</span>`).join('')}</div>` : ''}
  </header>
  <main class="wrap">
    <div class="section-title">${esc(DATA.sectionTitle||'ผลงาน')}</div>
    ${projHtml}
    ${w.title ? `<div class="why"><h2>${esc(w.title)}</h2><p>${esc(w.text)}</p></div>` : ''}
  </main>
  <footer class="wrap">
    <p>ติดต่อ: <a href="mailto:${esc(c.email)}">${esc(c.email)}</a>${c.note ? ' · ' + esc(c.note) : ''}</p>
  </footer>`;
</script>
</body>
</html>
